<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="app.webmanifest">
    <script src="app.js?2"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#101010">
</head>
<body>
    <div id="app">
        <div class="login-panel">
            <div class="login-form">
                <p></p>
                <input type="text" id="username" name="username" placeholder="Käyttäjätunnus">
                <input type="password" id="password" name="password" placeholder="Salasana">
                <div class="button" id="login">Kirjaudu</div>
            </div>
        </div>
        <div class="main-panel">
            <div class="menu-column">
                <div class="button-group">
                    <div class="statistics-button" id="statistics-button">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M640-400q-50 0-85-35t-35-85q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35ZM400-160v-76q0-21 10-40t28-30q45-27 95.5-40.5T640-360q56 0 106.5 13.5T842-306q18 11 28 30t10 40v76H400Zm86-80h308q-35-20-74-30t-80-10q-41 0-80 10t-74 30Zm154-240q17 0 28.5-11.5T680-520q0-17-11.5-28.5T640-560q-17 0-28.5 11.5T600-520q0 17 11.5 28.5T640-480Zm0-40Zm0 280ZM120-400v-80h320v80H120Zm0-320v-80h480v80H120Zm324 160H120v-80h360q-14 17-22.5 37T444-560Z"/></svg>
                    </div>
                    <a href="#" id="session-info"></a>
                </div>
                <div class="navigation">
                    <div class="marker"></div>
                </div>
                <div class="quick-payment">
                    Oma summa
                </div>
            </div>
            <div class="product-column">

            </div>
        </div>
        <div class="session-panel">
            <div class="session-window">
                <div class="session-details">
                    <p>Hostaaja: <span id="session-name"></span></p>
                    <p>Aloitusaika: <span id="session-started-at"></span></p>
                    <p>Piikkeihin lisätty tämän hostauksen aikana</p>
                    <p>Yhteensä: <span id="session-total-all"></span></p>
                    <p>Vain hostaajalle: <span id="session-total-host"></span></p>
                    <div class="session-end-form">
                        <input type="number" id="session-people" placeholder="Hlöä">
                        <input type="text" id="session-comment" placeholder="Mitä tuli tehtyä?">
                    </div>
                    <div class="buttons">
                        <div class="button close">Sulje</div>
                        <div class="button" id="session-end">Lopeta hostaus</div>
                    </div>
                </div>
                <div class="session-selection">
                    <div id="session-tab-list" class="tab-list"></div>
                    <div class="buttons">
                        <div class="button close">Sulje</div>
                        <div class="button disabled" id="session-confirm">Aloita hostaus</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="statistics-panel">
            <div class="statistics-window">
                <div class="statistics-list-view">
                    <h2>Kaikki piikit</h2>
                    <div class="statistics-tabs"></div>
                    <div class="buttons">
                        <div class="button close">Sulje</div>
                    </div>
                </div>
                <div class="statistics-detail-view" style="display: none;">
                    <div class="statistics-detail-header">
                        <div class="back">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
                        </div>
                        <h2 id="statistics-tab-name"></h2>
                    </div>
                    <p class="statistics-status"><span id="statistics-tab-status"></span></p>
                    <p>Saldo: <span id="statistics-tab-balance"></span></p>
                    <p id="statistics-tab-adjustment"></p>
                    <h3>Viimeisimmät ostokset</h3>
                    <div class="statistics-purchases"></div>
                    <div class="buttons">
                        <div class="button close">Sulje</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="checkout-panel">
            <div class="top-bar">
                <div class="back">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
                </div>
                <h1 id="checkout-title"></h1>
            </div>
            <main>
                <div class="tab-column">
                    <h2>Piikki</h2>
                    <div class="tab-list">
                        <div class="alphabet-container">
                            <div class="alphabet"></div>
                            <h3>Viimeisimmät</h3>
                            <div class="suggestions"></div>
                        </div>
                        <h3>Kaikki</h3>
                        <div class="tabs">
                        </div>
                    </div>
                </div>
                <div class="checkout-column">
                    <div class="options">
                        <div id="checkout-price"></div>
                        <div id="checkout-quantity">
                            <h2>Määrä</h2>
                            <div class="quantity-button" id="decrease">−</div>
                            <input id="quantity" type="number">
                            <div class="quantity-button" id="increase">+</div>
                        </div>
                    </div>
                    <div class="description" id="checkout-description">
                    </div>
                    <div class="confirmation" id="confirmation">
                        <div class="pinpad" id="pinpad"></div>
                        <div class="summary"></div>
                        <div class="button">
                            <div>Lisää piikkiin</div>
                            <div class="pin-prompt">Syötä PIN</div>
                            <div class="accepted">Hyväksytty</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
